<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Ballistic Recognition Tool</title>
    <style>
        /* General Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, box-shadow 0.3s;
        }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            background: #f8f9fa;
            color: #333;
        }
        body.dark-theme {
            background: #2c3e50;
            color: #f8f9fa;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .main-content h2 {
            font-size: 24px;
            color: #2c3e50;
        }
        body.dark-theme .main-content h2 {
            color: #f8f9fa;
        }

        /* Settings Section */
        .settings-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        body.dark-theme .settings-container {
            background: #34495e;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }
        .settings-container h3 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #34495e;
        }
        body.dark-theme .settings-container h3 {
            color: #ecf0f1;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        body.dark-theme .setting-item {
            border-bottom: 1px solid #4a6278;
        }
        .setting-item:last-child {
            border-bottom: none;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 20px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #ccc;
            border-radius: 20px;
            transition: 0.3s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .slider {
            background: #2980b9;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Button */
        .btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease-in-out;
        }
        .btn:hover {
            background: #c0392b;
        }
        body.dark-theme .btn {
            background: #c0392b;
        }
        body.dark-theme .btn:hover {
            background: #922b21;
        }
    </style>
</head>
<body>
    <main class="main-content">
        <h2>Settings</h2>
        <div class="settings-container">
            <h3>Preferences</h3>

            <div class="setting-item">
                <span>Dark Mode</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="themeToggle" class="setting-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <span>Enable Security Alerts</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="securityToggle" class="setting-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <span>Data Auto-Save</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="autoSaveToggle" class="setting-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn" id="resetButton">Reset Settings</button>
        </div>
    </main>

    <script>
        // Get all toggle elements
        const themeToggle = document.getElementById('themeToggle');
        const securityToggle = document.getElementById('securityToggle');
        const autoSaveToggle = document.getElementById('autoSaveToggle');
        const resetButton = document.getElementById('resetButton');
        const allToggles = document.querySelectorAll('.setting-toggle');
        
        // Initialize settings from localStorage
        function loadSettings() {
            // Dark mode setting
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-theme');
                themeToggle.checked = true;
            }
            
            // Security alerts setting
            if (localStorage.getItem('securityAlerts') === 'disabled') {
                securityToggle.checked = false;
            } else {
                // Default is enabled
                securityToggle.checked = true;
                localStorage.setItem('securityAlerts', 'enabled');
            }
            
            // Auto-save setting
            if (localStorage.getItem('autoSave') === 'enabled') {
                autoSaveToggle.checked = true;
            }
        }
        
        // Save settings to localStorage
        function saveSettings() {
            // Save each setting individually
            localStorage.setItem('darkMode', themeToggle.checked ? 'enabled' : 'disabled');
            localStorage.setItem('securityAlerts', securityToggle.checked ? 'enabled' : 'disabled');
            localStorage.setItem('autoSave', autoSaveToggle.checked ? 'enabled' : 'disabled');
        }
        
        // Reset all settings to defaults
        function resetSettings() {
            // Confirm reset
            if (confirm('Are you sure you want to reset all settings to default?')) {
                // Default values
                themeToggle.checked = false;
                securityToggle.checked = true;
                autoSaveToggle.checked = false;
                
                // Apply theme change
                document.body.classList.remove('dark-theme');
                
                // Save defaults to localStorage
                saveSettings();
                
                // Show confirmation
                alert('Settings have been reset to default.');
            }
        }
        
        // Load settings on page load
        loadSettings();
        
        // Add event listeners for each toggle
        allToggles.forEach(toggle => {
            toggle.addEventListener('change', function() {
                saveSettings();
                
                // For theme toggle, apply visual changes
                if (this.id === 'themeToggle') {
                    if (this.checked) {
                        document.body.classList.add('dark-theme');
                    } else {
                        document.body.classList.remove('dark-theme');
                    }
                }
            });
        });
        
        // Add event listener for reset button
        resetButton.addEventListener('click', resetSettings);
    </script>
</body>
</html>
